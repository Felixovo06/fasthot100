<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FAST/HOT·100 — 考前 5 小时冲刺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
<div class="noise" aria-hidden="true"></div>

<header class="hud">
  <div class="brand">FAST<i>/</i>HOT·100<em>考前冲刺速记</em></div>
  <div class="hud-right">
    <div class="hud-cell vstat"><label>访问</label><b id="vercount_value_site_pv" class="mono">…</b></div>
    <div class="hud-cell vstat"><label>访客</label><b id="vercount_value_site_uv" class="mono">…</b></div>
    <div class="hud-cell divide"><label>已用</label><b id="hud-used" class="mono">0:00:00</b></div>
    <div class="hud-cell"><label>预算</label><b class="mono dim">5:00:00</b></div>
    <div class="hud-cell"><label>节奏</label><b id="hud-pace" class="mono">—</b></div>
  </div>
</header>
<div class="budget" title="5 小时总预算">
  <div class="budget-fill" id="budget-fill"></div>
  <i style="left:20%"></i><i style="left:40%"></i><i style="left:60%"></i><i style="left:80%"></i>
</div>

<main id="view"></main>
